<!doctype html>
<html>
  <head>
    <title>Exercise</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ProducteDetail({ itemName, price, discountPrice,imageSrc }) {
        return (
          <div>
            <img src={imageSrc} alt="" width="200px"/>
            <p>{itemName}</p>
            {!discountPrice ? (
              <p>Price: ${price.toFixed(2)}</p>
            ) : (
              <del>
                <p>Price:${price.toFixed(2)}</p>
              </del>
            )}

            {discountPrice && <p>Discount Price: ${discountPrice}</p>}
            <button>Add to Cart</button>
          </div>
        );
      }
      function App() {
        return (
          <>
            <ProducteDetail
              itemName="Cotton socks"
              price={10.9}
              discountPrice={5.45}
              imageSrc="cotton-socks.png"
            />
            <ProducteDetail itemName="Tennis Balls" price={6.0} imageSrc="tennis-balls.png"/>
            <ProducteDetail itemName="Plain T-shirts" price={7.99} imageSrc="plain-t-shirt.png" />
          </>
        );
      }

      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
